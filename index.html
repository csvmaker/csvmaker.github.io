 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background:#0c0e1a"><!-- Toast container -->
   <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div><!-- Header -->
   <header class="fade-up" style="padding:2rem 1.5rem 0">
    <div class="max-w-3xl mx-auto text-center">
     <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-medium mb-4" style="background:#1a1d2e;color:#818cf8;border:1px solid #2a2d42"><i data-lucide="file-spreadsheet" style="width:14px;height:14px"></i> CSV TOOL
     </div>
     <h1 id="page-title" class="text-3xl sm:text-4xl font-bold mb-2" style="color:#e2e8f0">CSV Allowlist Generator</h1>
     <p id="subtitle" class="text-sm sm:text-base" style="color:#64748b">Generate allowlist CSV files for NFT mints — supports 10,000+ addresses</p>
    </div>
   </header><!-- Main -->
   <main style="padding:1.5rem;padding-bottom:3rem">
    <div class="max-w-3xl mx-auto flex flex-col gap-5"><!-- Wallet Addresses -->
     <div class="fade-up-2 rounded-2xl p-5 sm:p-6 card-hover" style="background:#12152a;border:1px solid #1e2140"><label class="flex items-center gap-2 text-sm font-semibold mb-1" style="color:#c7d2fe"> <i data-lucide="wallet" style="width:16px;height:16px;color:#818cf8"></i> Wallet Addresses </label>
      <p class="text-xs mb-3" style="color:#64748b">One address per line. Supports 10,000+ addresses.</p><textarea id="addresses" rows="8" placeholder="0x1234...abcd
0x5678...efgh
0x9abc...1234" class="w-full rounded-xl p-4 text-sm resize-y focus:outline-none focus:ring-2" style="background:#0c0e1a;color:#e2e8f0;border:1px solid #1e2140;focus:ring-color:#6366f1;min-height:120px"></textarea>
      <div class="flex items-center justify-between mt-2"><span id="addr-count" class="text-xs mono" style="color:#64748b">0 addresses</span> <button onclick="clearAddresses()" class="text-xs flex items-center gap-1 px-2 py-1 rounded-lg transition-colors" style="color:#64748b;background:transparent" onmouseover="this.style.color='#f87171'" onmouseout="this.style.color='#64748b'"> <i data-lucide="trash-2" style="width:12px;height:12px"></i> Clear </button>
      </div>
     </div><!-- Options Row -->
     <div class="fade-up-3 grid grid-cols-1 sm:grid-cols-2 gap-4"><!-- Mint Limit -->
      <div class="rounded-2xl p-5 card-hover" style="background:#12152a;border:1px solid #1e2140"><label class="flex items-center gap-2 text-sm font-semibold mb-1" style="color:#c7d2fe"> <i data-lucide="hash" style="width:16px;height:16px;color:#818cf8"></i> Custom Mint Limit </label>
       <p class="text-xs mb-3" style="color:#64748b">Mints per address (optional)</p><input id="mint-limit" type="number" min="1" placeholder="e.g. 3" class="w-full rounded-xl p-3 text-sm mono focus:outline-none focus:ring-2" style="background:#0c0e1a;color:#e2e8f0;border:1px solid #1e2140">
      </div><!-- Price -->
      <div class="rounded-2xl p-5 card-hover" style="background:#12152a;border:1px solid #1e2140"><label class="flex items-center gap-2 text-sm font-semibold mb-1" style="color:#c7d2fe"> <i data-lucide="coins" style="width:16px;height:16px;color:#818cf8"></i> Custom Price in Native Token </label>
       <p class="text-xs mb-3" style="color:#64748b">e.g. ETH price (optional)</p><input id="price" type="text" inputmode="decimal" placeholder="e.g. 0.01" class="w-full rounded-xl p-3 text-sm mono focus:outline-none focus:ring-2" style="background:#0c0e1a;color:#e2e8f0;border:1px solid #1e2140">
      </div>
     </div><!-- Preview -->
     <div class="rounded-2xl p-5 sm:p-6" style="background:#12152a;border:1px solid #1e2140">
      <div class="flex items-center justify-between mb-3"><span class="flex items-center gap-2 text-sm font-semibold" style="color:#c7d2fe"> <i data-lucide="eye" style="width:16px;height:16px;color:#818cf8"></i> CSV Preview </span> <span id="preview-badge" class="text-xs px-2 py-0.5 rounded-full mono" style="background:#1e2140;color:#64748b">—</span>
      </div>
      <div id="preview" class="rounded-xl p-4 text-xs mono overflow-x-auto" style="background:#0c0e1a;color:#94a3b8;border:1px solid #1e2140;max-height:180px;overflow-y:auto;white-space:pre">
       Add wallet addresses above to see a preview
      </div>
     </div><!-- Generate Button --> <button onclick="generateCSV()" id="gen-btn" class="w-full py-4 rounded-2xl font-semibold text-base flex items-center justify-center gap-2 transition-all glow" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'"> <i data-lucide="download" style="width:20px;height:20px"></i> <span>Generate &amp; Download CSV</span> </button>
    </div>

  <script>
const defaultConfig = {
  page_title: 'CSV Allowlist Generator',
  subtitle: 'Generate allowlist CSV files for NFT mints — supports 10,000+ addresses',
  background_color: '#0c0e1a',
  surface_color: '#12152a',
  text_color: '#e2e8f0',
  accent_color: '#818cf8',
  btn_gradient_start: '#6366f1'
};

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    const t = (k) => config[k] || defaultConfig[k];
    document.getElementById('page-title').textContent = t('page_title');
    document.getElementById('subtitle').textContent = t('subtitle');
    const app = document.getElementById('app');
    app.style.background = t('background_color');
    document.querySelectorAll('#page-title').forEach(e => e.style.color = t('text_color'));
  },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get:()=>config.background_color||defaultConfig.background_color, set:(v)=>{config.background_color=v;window.elementSdk.setConfig({background_color:v})} },
      { get:()=>config.surface_color||defaultConfig.surface_color, set:(v)=>{config.surface_color=v;window.elementSdk.setConfig({surface_color:v})} },
      { get:()=>config.text_color||defaultConfig.text_color, set:(v)=>{config.text_color=v;window.elementSdk.setConfig({text_color:v})} },
      { get:()=>config.accent_color||defaultConfig.accent_color, set:(v)=>{config.accent_color=v;window.elementSdk.setConfig({accent_color:v})} },
      { get:()=>config.btn_gradient_start||defaultConfig.btn_gradient_start, set:(v)=>{config.btn_gradient_start=v;window.elementSdk.setConfig({btn_gradient_start:v})} },
    ],
    borderables: [],
    fontEditable: undefined,
    fontSizeable: undefined
  }),
  mapToEditPanelValues: (config) => new Map([
    ['page_title', config.page_title || defaultConfig.page_title],
    ['subtitle', config.subtitle || defaultConfig.subtitle]
  ])
});

const addrEl = document.getElementById('addresses');
const countEl = document.getElementById('addr-count');
const previewEl = document.getElementById('preview');
const badgeEl = document.getElementById('preview-badge');

function getAddresses() {
  return addrEl.value.split('\n').map(a => a.trim()).filter(a => a.length > 0);
}

function updatePreview() {
  const addrs = getAddresses();
  const ml = document.getElementById('mint-limit').value.trim();
  const pr = document.getElementById('price').value.trim();
  const count = addrs.length;
  countEl.textContent = count + ' address' + (count !== 1 ? 'es' : '');

  if (count === 0) {
    previewEl.textContent = 'Add wallet addresses above to see a preview';
    badgeEl.textContent = '—';
    return;
  }

  // Build header
  let header = 'address';
  if (ml) header += ',mintLimit';
  if (pr) header += ',price';

  // Build rows (show max 5 in preview)
  const show = addrs.slice(0, 5);
  let rows = show.map(a => {
    let row = a;
    if (ml) row += ',' + ml;
    if (pr) row += ',' + pr;
    return row;
  });

  let text = header + '\n' + rows.join('\n');
  if (count > 5) text += '\n... and ' + (count - 5) + ' more rows';

  previewEl.textContent = text;
  badgeEl.textContent = count + ' rows';
}

addrEl.addEventListener('input', updatePreview);
document.getElementById('mint-limit').addEventListener('input', updatePreview);
document.getElementById('price').addEventListener('input', updatePreview);

function clearAddresses() {
  addrEl.value = '';
  updatePreview();
}

function showToast(msg, type) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast-in flex items-center gap-2 px-4 py-3 rounded-xl text-sm font-medium shadow-lg';
  const bg = type === 'success' ? '#065f46' : '#7f1d1d';
  const border = type === 'success' ? '#10b981' : '#f87171';
  t.style.cssText = `background:${bg};color:#fff;border:1px solid ${border}`;
  const icon = type === 'success' ? '✓' : '✕';
  t.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(() => { t.className = 'toast-out'; setTimeout(() => t.remove(), 300); }, 3000);
}

function generateCSV() {
  const addrs = getAddresses();
  if (addrs.length === 0) { showToast('Please add at least one wallet address', 'error'); return; }

  const ml = document.getElementById('mint-limit').value.trim();
  const pr = document.getElementById('price').value.trim();

  let header = 'address';
  if (ml) header += ',mintLimit';
  if (pr) header += ',price';

  // Build CSV in chunks for large datasets
  const chunks = [header + '\n'];
  const chunkSize = 1000;
  for (let i = 0; i < addrs.length; i += chunkSize) {
    const slice = addrs.slice(i, i + chunkSize);
    let block = '';
    for (const a of slice) {
      block += a;
      if (ml) block += ',' + ml;
      if (pr) block += ',' + pr;
      block += '\n';
    }
    chunks.push(block);
  }

  const blob = new Blob(chunks, { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'allowlist.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  showToast(`Downloaded CSV with ${addrs.length} addresses`, 'success');
}

lucide.createIcons();
</script>
